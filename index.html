<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>BestiePaw — 智能宠物生活伴侣</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --font-display: 'Sora', 'Noto Sans SC', -apple-system, 'PingFang SC', sans-serif;
      --font-body: 'Plus Jakarta Sans', 'Noto Sans SC', -apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;

      --primary: #C05230;
      --primary-light: #F5E6E0;
      --secondary: #2B7A5F;
      --secondary-light: #E3F0EB;
      --gold: #B8943E;
      --gold-light: #FDF5E6;

      --bg: #FDFBF7;
      --surface: #F5F2EC;
      --surface-2: #EBE7DF;
      --text: #2A2420;
      --text-2: #6B6460;
      --text-3: #9B958F;
      --border: #E5E0D8;

      --error: #D4382C;
      --error-light: #FFF5F5;

      --sidebar-bg: #1E1B18;
      --sidebar-text: #E8E4DE;

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    input, button, select, textarea { font-family: inherit; }
    ::placeholder { color: var(--text-3); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

    /* ---- Animations ---- */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1); }
    }

    .bp-fade-up { opacity: 1; }
    .bp-fade-up.bp-delay-1 { }
    .bp-fade-up.bp-delay-2 { }
    .bp-fade-up.bp-delay-3 { }
    .bp-modal-in { animation: modalIn 0.25s ease both; }
    .bp-toast-in { animation: toastIn 0.3s ease both; }

    .bp-spinner {
      width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    .bp-typing {
      display: flex; gap: 4px; align-items: center; padding: 4px 0;
    }
    .bp-typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-3); display: block;
      animation: typing 1.2s ease-in-out infinite;
    }
    .bp-typing span:nth-child(2) { animation-delay: 0.15s; }
    .bp-typing span:nth-child(3) { animation-delay: 0.3s; }

    /* ---- Hover effects ---- */
    .bp-btn-primary:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .bp-btn-secondary:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .bp-btn-outline:hover { background: var(--primary-light) !important; }
    .bp-btn-ghost:hover { border-color: var(--primary) !important; color: var(--primary) !important; }
    .bp-btn-soft:hover { filter: brightness(0.96); }

    .bp-card-hover:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); transform: translateY(-2px); }
    .bp-feature-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.08); transform: translateY(-3px); }
    .bp-action-btn:hover { background: var(--surface) !important; }

    .bp-avatar-upload:hover { border-color: var(--primary) !important; background: var(--primary-light) !important; }

    /* Focus */
    .bp-btn:focus-visible, button:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    /* ---- Responsive ---- */
    @media (max-width: 768px) {
      .bp-nav-links { display: none !important; }
      .bp-hamburger { display: flex !important; }
      .bp-hide-mobile { display: none !important; }
      .bp-feature-grid { grid-template-columns: 1fr !important; }
      .bp-how-grid { grid-template-columns: 1fr !important; gap: 2rem !important; }
      .bp-dash-grid { grid-template-columns: 1fr !important; }
      .bp-pet-grid { grid-template-columns: 1fr !important; }

      .bp-sidebar { display: none !important; }
      .bp-mobile-nav { display: block !important; }
      .bp-app-main { padding: 1.25rem !important; padding-bottom: 5rem !important; }
    }

    @media (min-width: 769px) {
      .bp-mobile-nav { display: none !important; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ---- Selection ---- */
    ::selection { background: var(--primary-light); color: var(--primary); }

    /* ---- Print ---- */
    @media print { .bp-sidebar, .bp-mobile-nav { display: none !important; } }
  </style>
</head>
<body>
  <div id="bp-root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="app/services.jsx"></script>
  <script type="text/babel" src="app/ui.jsx"></script>
  <script type="text/babel" src="app/public.jsx"></script>
  <script type="text/babel" src="app/dashboard.jsx"></script>
  <script type="text/babel" src="app/health.jsx"></script>
  <script type="text/babel" src="app/social.jsx"></script>
  <script type="text/babel" src="app/settings.jsx"></script>
  <script type="text/babel" src="app/main.jsx"></script>
</body>
</html>
