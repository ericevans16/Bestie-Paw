packages:
  - 'bestie-paw-backend'
  - 'bestie-paw-frontend'
  - 'packages/*'

# These deps have install/build scripts that this CI's supply-chain layer blocks.
# Acknowledge them as intentionally-unbuilt so pnpm does not fail the install.
# (Frontend build does not need their native postinstalls; esbuild resolves its
#  platform binary package at runtime.)
ignoredBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - bcrypt
  - esbuild
  - prisma
