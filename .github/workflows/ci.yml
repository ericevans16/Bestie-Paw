name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: bestie_paw_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: ./bestie-paw-backend

    env:
      DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/bestie_paw_test?schema=public
      JWT_ACCESS_SECRET: dummy_access_secret_for_testing_1234567890
      JWT_REFRESH_SECRET: dummy_refresh_secret_for_testing_1234567890
      NODE_ENV: test
      PORT: 3000
      FRONTEND_URL: http://localhost:5173

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./bestie-paw-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Type Check
        run: npm run typecheck

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm test

  frontend-build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        # version comes from root package.json "packageManager" (pnpm@11.5.2);
        # do NOT also set `version:` here or action-setup errors on the conflict.

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # pnpm 11.5.2 requires Node >= 22.13

      - name: Install dependencies (workspace)
        # --ignore-scripts: this CI's supply-chain layer blocks dependency
        # postinstall/build scripts (esbuild/prisma/bcrypt), which otherwise makes
        # the install fail with ERR_PNPM_IGNORED_BUILDS regardless of
        # only/ignoredBuiltDependencies config. The frontend build doesn't need
        # those native builds — esbuild resolves its platform binary at runtime —
        # so skipping all dep scripts is safe here.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Type Check (frontend)
        run: pnpm --filter bestie-paw-frontend run typecheck

      - name: Lint (frontend)
        run: pnpm --filter bestie-paw-frontend run lint

      - name: Test (frontend)
        run: pnpm --filter bestie-paw-frontend run test

      - name: Build (frontend)
        run: pnpm --filter bestie-paw-frontend run build
