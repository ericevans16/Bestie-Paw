<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 — Bestie Paw</title>
  <meta name="description" content="登录 Bestie Paw，继续管理宠物健康档案与日常生活。" />
  <meta property="og:title" content="登录 — Bestie Paw" />
  <meta property="og:description" content="登录 Bestie Paw，继续管理宠物健康档案与日常生活。" />
  <meta property="og:type" content="website" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.65rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--white);
      font-size: 0.9rem;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      font-family: inherit;
    }
    .social-btn:hover { border-color: var(--primary); background: var(--primary-lt); }
    .social-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.25rem; }
    .password-wrap { position: relative; }
    .password-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 0.2rem;
    }
    .password-toggle:hover { color: var(--primary); }
    .helper-row {
      display: flex;
      justify-content: flex-end;
      margin: -0.5rem 0 1.25rem;
      font-size: 0.85rem;
    }
    .helper-row a,
    .register-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .helper-row a:hover,
    .register-link a:hover { text-decoration: underline; }
    .register-link {
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 1.25rem;
    }
  </style>
</head>
<body>
  <nav class="nav" aria-label="页面导航">
    <a href="index.html" class="nav-logo">Bestie<span>Paw</span> 🐾</a>
    <div class="nav-actions">
      <span style="font-size:0.875rem; color:var(--text-muted);">没有账号？</span>
      <a href="register.html" class="btn btn-outline">注册</a>
    </div>
  </nav>

  <main>
    <div class="page-center">
      <div class="card form-card">
        <h1 style="font-size:1.4rem; font-weight:700; margin-bottom:0.3rem;">欢迎回来 👋</h1>
        <p style="font-size:0.875rem; color:var(--text-muted); margin-bottom:1.5rem;">
          登录 Bestie Paw，继续照顾你的毛孩子。
        </p>

        <div class="social-row">
          <button type="button" class="social-btn" disabled title="即将上线">🍎 Apple 登录</button>
          <button type="button" class="social-btn" disabled title="即将上线">🔍 Google 登录</button>
        </div>
        <div class="divider">或使用邮箱登录</div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="login-email">邮箱<span>*</span></label>
            <input class="form-input" type="email" id="login-email" name="login-email"
                   placeholder="example@mail.com" autocomplete="email" />
          </div>

          <div class="form-group">
            <label class="form-label" for="login-password">密码<span>*</span></label>
            <div class="password-wrap">
              <input class="form-input" type="password" id="login-password" name="login-password"
                     placeholder="请输入密码" autocomplete="current-password" />
              <button type="button" class="password-toggle" id="toggle-login-password">显示</button>
            </div>
          </div>

          <div class="helper-row">
            <a href="#">忘记密码？</a>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg">登录</button>
        </form>

        <div class="register-link">
          还没有账号？<a href="register.html">立即注册</a>
        </div>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script>
    const loginPassword = document.getElementById('login-password');
    const toggleLoginPassword = document.getElementById('toggle-login-password');

    if (loginPassword && toggleLoginPassword) {
      toggleLoginPassword.addEventListener('click', () => {
        const isHidden = loginPassword.type === 'password';
        loginPassword.type = isHidden ? 'text' : 'password';
        toggleLoginPassword.textContent = isHidden ? '隐藏' : '显示';
      });
    }
  </script>
</body>
</html>
