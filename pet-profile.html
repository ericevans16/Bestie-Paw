<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登记宠物信息 — Bestie Paw</title>
  <meta name="description" content="填写宠物基本信息，建立专属健康档案。" />
  <meta property="og:title" content="登记宠物信息 — Bestie Paw" />
  <meta property="og:description" content="填写宠物基本信息，建立专属健康档案。" />
  <meta property="og:type" content="website" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .skip-link {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 1rem;
    }
    .skip-link a { color: var(--text-muted); text-decoration: underline; cursor: pointer; }
    .skip-link a:hover { color: var(--primary); }

    .tip-box {
      background: var(--accent-lt);
      border: 1px solid #A3D9C0;
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      font-size: 0.825rem;
      color: #0F6E56;
      margin-bottom: 1.25rem;
      line-height: 1.5;
    }

    .section-divider {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 1.5rem 0 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .gender-row { display: flex; gap: 0.75rem; margin-bottom: 1.25rem; }
    .gender-option input { display: none; }
    .gender-option label {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.5rem 1.1rem;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.18s;
      color: var(--text-muted);
    }
    .gender-option input:checked + label {
      background: var(--primary-lt);
      border-color: var(--primary);
      color: var(--primary);
      font-weight: 500;
    }

    .char-count { font-size: 0.8rem; color: var(--text-muted); text-align: right; }
  </style>
</head>
<body>

  <!-- ===== 导航栏 ===== -->
  <nav class="nav" aria-label="页面导航">
    <a href="index.html" class="nav-logo">Bestie<span>Paw</span> 🐾</a>
  </nav>

  <!-- ===== 宠物登记表单 ===== -->
  <main>
  <div class="page-center">
    <div class="card form-card-wide">

      <!-- 进度步骤 -->
      <div class="steps">
        <div class="step done">
          <div class="step-circle">✓</div>
          <div class="step-label">创建账号</div>
        </div>
        <div class="step-line done"></div>
        <div class="step active">
          <div class="step-circle">2</div>
          <div class="step-label">宠物信息</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-circle">3</div>
          <div class="step-label">完成</div>
        </div>
      </div>

      <h1 style="font-size:1.4rem; font-weight:700; margin-bottom:0.3rem;">告诉我们关于你的宠物 🐾</h1>
      <p style="font-size:0.875rem; color:var(--text-muted); margin-bottom:1.25rem;">
        填写越详细，我们的健康建议和 AI 分析就越精准。
      </p>

      <div class="tip-box">
        💡 信息可以随时在"宠物档案"中修改，现在填写基础信息即可
      </div>

      <form id="pet-form" novalidate>

        <!-- 头像上传 -->
        <div class="avatar-upload" id="avatar-zone"
             role="button" tabindex="0"
             aria-label="点击或按 Enter 上传宠物照片">
          <div class="avatar-circle" id="avatar-circle">🐶</div>
          <span class="avatar-upload-label">点击上传宠物照片（可选）</span>
          <label for="pet-avatar-input" class="sr-only">上传宠物照片</label>
          <input type="file" id="pet-avatar-input" accept="image/*" style="display:none;" />
        </div>

        <!-- 基本信息 -->
        <div class="section-divider">基本信息</div>

        <div class="form-group">
          <label class="form-label" for="pet-name">宠物名字<span>*</span></label>
          <input class="form-input" type="text" id="pet-name" name="pet-name"
                 placeholder="它叫什么名字？" />
        </div>

        <div class="section-divider">宠物类型</div>
        <div class="tag-group" style="margin-bottom:1.25rem;">
          <div class="tag-option">
            <input type="radio" id="type-dog" name="pet-type" value="dog" checked />
            <label for="type-dog">🐶 狗</label>
          </div>
          <div class="tag-option">
            <input type="radio" id="type-cat" name="pet-type" value="cat" />
            <label for="type-cat">🐱 猫</label>
          </div>
          <div class="tag-option">
            <input type="radio" id="type-rabbit" name="pet-type" value="rabbit" />
            <label for="type-rabbit">🐰 兔子</label>
          </div>
          <div class="tag-option">
            <input type="radio" id="type-bird" name="pet-type" value="bird" />
            <label for="type-bird">🐦 鸟类</label>
          </div>
          <div class="tag-option">
            <input type="radio" id="type-fish" name="pet-type" value="fish" />
            <label for="type-fish">🐟 鱼类</label>
          </div>
          <div class="tag-option">
            <input type="radio" id="type-other" name="pet-type" value="other" />
            <label for="type-other">🐾 其他</label>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="pet-breed">品种</label>
            <input class="form-input" type="text" id="pet-breed" name="pet-breed"
                   placeholder="如：金毛寻回猎犬" />
          </div>
          <div class="form-group">
            <label class="form-label" for="pet-birthday">出生日期（约）</label>
            <input class="form-input" type="date" id="pet-birthday" name="pet-birthday" />
          </div>
        </div>

        <!-- 性别 -->
        <div class="form-group" style="margin-bottom:0.4rem;">
          <label class="form-label">性别</label>
        </div>
        <div class="gender-row">
          <div class="gender-option">
            <input type="radio" id="gender-male" name="pet-gender" value="male" checked />
            <label for="gender-male">♂ 公</label>
          </div>
          <div class="gender-option">
            <input type="radio" id="gender-female" name="pet-gender" value="female" />
            <label for="gender-female">♀ 母</label>
          </div>
          <div class="gender-option">
            <input type="radio" id="gender-unknown" name="pet-gender" value="unknown" />
            <label for="gender-unknown">未知</label>
          </div>
        </div>

        <!-- 健康信息 -->
        <div class="section-divider">健康信息</div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="pet-weight">体重（kg）</label>
            <input class="form-input" type="number" id="pet-weight" name="pet-weight"
                   placeholder="如：5.2" step="0.1" min="0" />
          </div>
          <div class="form-group">
            <label class="form-label" for="pet-neutered">是否已绝育</label>
            <select class="form-select" id="pet-neutered" name="pet-neutered">
              <option value="">请选择</option>
              <option value="yes">是</option>
              <option value="no">否</option>
              <option value="unknown">不确定</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="pet-allergies">已知过敏/疾病史</label>
          <textarea class="form-textarea" id="pet-allergies" name="pet-allergies"
                    placeholder="如：对某类食物过敏、有皮肤问题等（没有可留空）"
                    maxlength="200" rows="3"></textarea>
          <div class="char-count"><span id="allergy-count">0</span>/200</div>
        </div>

        <!-- 小贴士 -->
        <div class="form-group">
          <label class="form-label" for="pet-note">补充备注</label>
          <textarea class="form-textarea" id="pet-note" name="pet-note"
                    placeholder="任何想让我们知道的事情，比如它的性格、特殊习惯…"
                    maxlength="300" rows="3"></textarea>
          <div class="char-count"><span id="note-count">0</span>/300</div>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:0.5rem;">
          保存并进入主页 →
        </button>

      </form>

      <div class="skip-link">
        <a onclick="window.location.href='index.html'">暂时跳过，稍后填写</a>
      </div>

    </div>
  </div>
  </main>

  <script src="js/main.js"></script>
  <script>
    /* 头像上传区域键盘支持 */
    const avatarZone = document.getElementById('avatar-zone');
    if (avatarZone) {
      avatarZone.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          document.getElementById('pet-avatar-input').click();
        }
      });
    }
  </script>
</body>
</html>
