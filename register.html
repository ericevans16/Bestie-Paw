<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册账号 — Bestie Paw</title>
  <meta name="description" content="注册 Bestie Paw 账号，为你的毛孩子建立专属健康档案。" />
  <meta property="og:title" content="注册账号 — Bestie Paw" />
  <meta property="og:description" content="注册 Bestie Paw 账号，为你的毛孩子建立专属健康档案。" />
  <meta property="og:type" content="website" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.65rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--white);
      font-size: 0.9rem;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      font-family: inherit;
    }
    .social-btn:hover { border-color: var(--primary); background: var(--primary-lt); }
    .social-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.25rem; }

    .password-wrap { position: relative; }
    .password-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 0.2rem;
    }
    .password-toggle:hover { color: var(--primary); }

    .agree-row {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .agree-row input { margin-top: 2px; accent-color: var(--primary); flex-shrink: 0; }
    .agree-row a { color: var(--primary); text-decoration: none; }
    .agree-row a:hover { text-decoration: underline; }

    .login-link {
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 1.25rem;
    }
    .login-link a { color: var(--primary); text-decoration: none; font-weight: 500; }

    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      margin-top: 0.4rem;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }
  </style>
</head>
<body>

  <!-- ===== 导航栏 ===== -->
  <nav class="nav" aria-label="页面导航">
    <a href="index.html" class="nav-logo">Bestie<span>Paw</span> 🐾</a>
    <div class="nav-actions">
      <span style="font-size:0.875rem; color:var(--text-muted);">已有账号？</span>
      <a href="login.html" class="btn btn-outline">登录</a>
    </div>
  </nav>

  <!-- ===== 注册表单 ===== -->
  <main>
  <div class="page-center">
    <div class="card form-card">

      <!-- 进度步骤 -->
      <div class="steps">
        <div class="step active">
          <div class="step-circle">1</div>
          <div class="step-label">创建账号</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-circle">2</div>
          <div class="step-label">宠物信息</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-circle">3</div>
          <div class="step-label">完成</div>
        </div>
      </div>

      <h1 style="font-size:1.4rem; font-weight:700; margin-bottom:0.3rem;">创建你的账号</h1>
      <p style="font-size:0.875rem; color:var(--text-muted); margin-bottom:1.5rem;">加入 Bestie Paw，为毛孩子建立专属档案</p>

      <!-- 第三方登录 -->
      <div class="social-row">
        <button type="button" class="social-btn" disabled title="即将上线">🍎 Apple 登录</button>
        <button type="button" class="social-btn" disabled title="即将上线">🔍 Google 登录</button>
      </div>
      <div class="divider">或使用邮箱注册</div>

      <!-- 注册表单 -->
      <form id="register-form" novalidate>

        <div class="form-group">
          <label class="form-label" for="username">昵称<span>*</span></label>
          <input class="form-input" type="text" id="username" name="username"
               placeholder="给自己起个名字" autocomplete="username" />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">邮箱<span>*</span></label>
          <input class="form-input" type="email" id="email" name="email"
                 placeholder="example@mail.com" autocomplete="email" />
        </div>

        <div class="form-group">
          <label class="form-label" for="phone">手机号 <span style="color:var(--text-muted); font-weight:400;">（选填）</span></label>
          <input class="form-input" type="tel" id="phone" name="phone"
                 placeholder="1xx xxxx xxxx" autocomplete="tel" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">密码<span>*</span></label>
          <div class="password-wrap">
            <input class="form-input" type="password" id="password" name="password"
                   placeholder="至少 8 位，包含字母和数字" autocomplete="new-password" />
            <button type="button" class="password-toggle" id="toggle-pwd">显示</button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <p class="form-hint" id="strength-label" style="margin-top:0.2rem;"></p>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">确认密码<span>*</span></label>
          <div class="password-wrap">
            <input class="form-input" type="password" id="confirm-password" name="confirm-password"
                   placeholder="再输入一次密码" autocomplete="new-password" />
            <button type="button" class="password-toggle" id="toggle-confirm">显示</button>
          </div>
        </div>

        <div class="agree-row">
          <input type="checkbox" id="agree" name="agree" />
          <label for="agree">
            我已阅读并同意 <a href="#">服务条款</a> 与 <a href="#">隐私政策</a>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg">注册并继续 →</button>

      </form>

      <div class="login-link">
        已有账号？<a href="login.html">直接登录</a>
      </div>

    </div>
  </div>
  </main>

  <script src="js/main.js"></script>
  <script>
    /* 密码显示切换 */
    function togglePassword(inputId, btnId) {
      const input = document.getElementById(inputId);
      const btn   = document.getElementById(btnId);
      btn.addEventListener('click', () => {
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        btn.textContent = isHidden ? '隐藏' : '显示';
      });
    }
    togglePassword('password', 'toggle-pwd');
    togglePassword('confirm-password', 'toggle-confirm');

    /* 密码强度检测 */
    const pwdInput = document.getElementById('password');
    const fill     = document.getElementById('strength-fill');
    const label    = document.getElementById('strength-label');
    const levels   = [
      { max: 1, color: '#E24B4A', text: '太弱' },
      { max: 2, color: '#EF9F27', text: '较弱' },
      { max: 3, color: '#639922', text: '一般' },
      { max: 4, color: '#1D9E75', text: '强' },
    ];
    pwdInput.addEventListener('input', () => {
      const v = pwdInput.value;
      let score = 0;
      if (v.length >= 8) score++;
      if (/[A-Z]/.test(v)) score++;
      if (/[0-9]/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;
      const lv = levels[Math.max(0, score - 1)];
      fill.style.width  = (score * 25) + '%';
      fill.style.background = lv ? lv.color : 'transparent';
      label.textContent = v.length ? (lv ? '密码强度：' + lv.text : '') : '';
    });

  </script>
</body>
</html>
